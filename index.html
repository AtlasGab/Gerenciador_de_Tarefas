<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gerenciador de Tarefas</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark">

    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold text-light">
                Gerenciador de Tarefas
            </h1>

            <button class="btn btn-roxo rounded-pill px-4"
                data-bs-toggle="collapse"
                data-bs-target="#formulario">
                Nova tarefa
            </button>
        </div>

        <div class="collapse mb-4" id="formulario">

            <div class="card bg-body-tertiary border-0 shadow rounded-4 p-4">

                <input type="text"
                    id="titulo"
                    class="form-control mb-3"
                    placeholder="Título da tarefa">

                <textarea
                    id="descricao"
                    class="form-control mb-3"
                    placeholder="Descrição"></textarea>

                <button class="btn btn-roxo rounded-pill"
                    onclick="criarTarefa()">
                    Salvar tarefa
                </button>

            </div>

        </div>

        <div class="row g-4">

            <div class="col-md-4">
                <div class="card bg-body-tertiary border-0 shadow rounded-4 p-3">

                    <h4 class="text-center mb-3">
                        A Fazer
                    </h4>

                    <div id="aFazer"></div>

                </div>
            </div>

            <div class="col-md-4">
                <div class="card bg-body-tertiary border-0 shadow rounded-4 p-3">

                    <h4 class="text-center mb-3">
                        Em andamento
                    </h4>

                    <div id="emAndamento"></div>

                </div>
            </div>

            <div class="col-md-4">
                <div class="card bg-body-tertiary border-0 shadow rounded-4 p-3">

                    <h4 class="text-center mb-3">
                        Concluídas
                    </h4>

                    <div id="concluidas"></div>

                </div>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
